trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
- name: serviceConnection
  value: Enterprise-Infrastructure-SC

stages:
- stage: Validate
  jobs:
  - job: ValidateTerraform
    steps:
    - checkout: self

    - script: terraform version
      displayName: Verify Terraform

    - script: |
        terraform init
        terraform fmt -check
        terraform validate
      workingDirectory: terraform
      displayName: Terraform Validate

- stage: Plan
  dependsOn: Validate
  jobs:
  - job: TerraformPlan
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform
          terraform init
          terraform plan \
            -out=tfplan \
            -var="tenant_id=$(az account show --query tenantId -o tsv)"

    - task: PublishPipelineArtifact@1
      displayName: Publish Terraform Plan
      inputs:
        targetPath: terraform/tfplan
        artifact: tfplan

- stage: Deploy
  displayName: Deploy Infrastructure
  dependsOn: Plan

  jobs:

  - deployment: TerraformApply

    displayName: Terraform Apply

    environment: Production

    strategy:

      runOnce:

        deploy:

          steps:

          - checkout: self

          - download: current
            artifact: tfplan

          - script: |
              terraform version
            displayName: Verify Terraform

          - task: AzureCLI@2
            displayName: Terraform Apply

            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript

              inlineScript: |
                cd terraform

                terraform init

                terraform apply \
                  -auto-approve \
                  "$(Pipeline.Workspace)/tfplan/tfplan"
